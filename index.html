<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VoidClient — Ultimate Minecraft Launcher</title>
    <!-- Google Fonts + Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8f9fc 0%, #cfd5e0 100%);
            /* szaro-biały gradient – eleganckie przejście od jasnego do stonowanego szarego */
            min-height: 100vh;
            color: #1a1e2b;
            line-height: 1.5;
        }

        /* kontener główny */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
        }

        /* nagłówek: logo + przyciski językowe */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 3rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 52px;
            height: 52px;
            object-fit: contain;
            background: rgba(255,255,240,0.2);
            border-radius: 18px;
            transition: transform 0.2s ease;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(130deg, #1f2b3c, #2c3e4e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .lang-switch {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 100px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .lang-btn {
            background: transparent;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 40px;
            transition: all 0.2s;
            color: #2c3e50;
            font-family: inherit;
        }

        .lang-btn.active {
            background: #1e2a36;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .lang-btn:not(.active):hover {
            background: rgba(30,42,54,0.1);
        }

        /* główny layout 2 kolumny */
        .hero {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 3rem;
            margin: 2rem 0 3rem;
        }

        .hero-left {
            flex: 1.2;
            min-width: 280px;
        }

        .hero-right {
            flex: 1;
            min-width: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .badge {
            display: inline-block;
            background: rgba(0,0,0,0.08);
            backdrop-filter: blur(2px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            color: #2c3e50;
        }

        h1 {
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.2;
            margin-bottom: 1.2rem;
            background: linear-gradient(120deg, #181e2c, #2c3e50);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .description {
            font-size: 1.2rem;
            color: #2c3e50;
            margin-bottom: 2rem;
            max-width: 90%;
            font-weight: 450;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0.9rem 1.8rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.2s;
            cursor: pointer;
            text-decoration: none;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: #1f2f3c;
            color: white;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            background: #0f1e2a;
            transform: translateY(-3px);
            box-shadow: 0 14px 24px rgba(0,0,0,0.12);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #2c3e50;
            color: #1e2a36;
        }

        .btn-outline:hover {
            background: rgba(44,62,80,0.08);
            transform: translateY(-2px);
        }

        .btn-ghost {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0,0,0,0.1);
            color: #1e2a36;
        }

        .btn-ghost:hover {
            background: white;
            transform: translateY(-2px);
        }

        .download-stats {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            background: rgba(0,0,0,0.04);
            padding: 0.7rem 1.4rem;
            border-radius: 60px;
            width: fit-content;
            backdrop-filter: blur(2px);
        }

        .download-stats i {
            font-size: 1.3rem;
            color: #2c3e50;
        }

        .download-count {
            font-weight: 800;
            font-size: 1.3rem;
            margin-left: 4px;
            color: #0f2b3b;
        }

        /* obrazek hero - duży placeholder (imgur później) */
        .hero-img {
            max-width: 100%;
            border-radius: 32px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.25);
            transition: transform 0.25s ease;
            background: #eef2f7;
            object-fit: cover;
            width: 100%;
            height: auto;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .hero-img:hover {
            transform: scale(1.01);
        }

        .img-caption {
            text-align: center;
            font-size: 0.75rem;
            margin-top: 12px;
            color: #4a5b6e;
            background: rgba(255,255,240,0.5);
            width: fit-content;
            padding: 4px 12px;
            border-radius: 60px;
            margin-left: auto;
            margin-right: auto;
        }

        /* stopka/info */
        .footer-note {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.8rem;
            color: #3a4c62;
            border-top: 1px solid rgba(0,0,0,0.08);
            padding-top: 2rem;
        }

        @media (max-width: 850px) {
            .container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2.7rem;
            }
            .description {
                max-width: 100%;
            }
            .hero {
                flex-direction: column-reverse;
            }
            .button-group {
                justify-content: center;
            }
            .download-stats {
                margin: 0 auto;
            }
        }

        @media (max-width: 480px) {
            .btn {
                padding: 0.7rem 1.2rem;
                font-size: 0.85rem;
            }
            .logo-text {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- nagłówek z logo (imgur placeholder) oraz języki -->
        <div class="navbar">
            <div class="logo-area">
                <!-- logo z imgur - użytkownik podmieni później źródło -->
                <img id="siteLogo" class="logo-img" src="https://placehold.co/200x200?text=VC+Logo&bg=2c3e50&textColor=ffffff" alt="VoidClient Logo (imgur later)">
                <span class="logo-text">VoidClient</span>
            </div>
            <div class="lang-switch">
                <button id="langEnBtn" class="lang-btn active">🇬🇧 EN</button>
                <button id="langPlBtn" class="lang-btn">🇵🇱 PL</button>
            </div>
        </div>

        <!-- główna sekcja hero (lewa tekst+prawa grafika) -->
        <div class="hero">
            <div class="hero-left">
                <div class="badge" id="versionBadge">
                    <i class="fas fa-cube"></i> <span id="badgeText">MINECRAFT LAUNCHER</span>
                </div>
                <h1 id="mainTitle">VoidClient</h1>
                <p class="description" id="mainDesc">
                    High-performance, custom Minecraft launcher designed for speed and simplicity. 
                    Manage your installations effortlessly.
                </p>
                <div class="button-group">
                    <!-- przycisk download - link do youtube.com (tymczasowo) + zwiększa licznik -->
                    <button id="downloadBtn" class="btn btn-primary">
                        <i class="fas fa-download"></i> <span id="downloadBtnText">Download Now</span>
                    </button>
                    <!-- przycisk GitHub Source (tymczasowy link github) -->
                    <a id="githubBtn" href="https://github.com" target="_blank" rel="noopener noreferrer" class="btn btn-outline">
                        <i class="fab fa-github"></i> <span id="githubBtnText">GitHub Source</span>
                    </a>
                    <!-- Learn more przycisk (demo) -->
                    <button id="learnMoreBtn" class="btn btn-ghost">
                        <i class="fas fa-circle-info"></i> <span id="learnMoreText">Learn more</span>
                    </button>
                </div>
                <!-- licznik pobrań z dynamiczną etykietą -->
                <div class="download-stats">
                    <i class="fas fa-arrow-down"></i>
                    <span id="downloadsLabel">Downloads:</span>
                    <span id="downloadCount" class="download-count">0</span>
                </div>
            </div>
            <div class="hero-right">
                <div style="width: 100%; text-align: center;">
                    <!-- duży obrazek (z imgur później) - placeholder z efektem wizualnym -->
                    <img id="heroLargeImg" class="hero-img" src="https://placehold.co/700x450/2c3e50/white?text=VoidClient+Preview+%F0%9F%8E%AE+Minecraft+Launcher" alt="VoidClient preview - replace with imgur image">
                    <div class="img-caption">
                        <i class="fas fa-image"></i> <span id="imgCaptionText">▶ Zdjęcie z imgur (możesz podmienić)</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer-note">
            <i class="fas fa-code-branch"></i> VoidClient — next-gen Minecraft launcher • <span id="footerNoteText">Open source & blazing fast</span>
        </div>
    </div>

    <script>
        // ----------------------------- TEKSTY I TŁUMACZENIA (EN/PL) ---------------------------------
        const translations = {
            en: {
                badgeText: "MINECRAFT LAUNCHER",
                mainTitle: "VoidClient",
                mainDesc: "High-performance, custom Minecraft launcher designed for speed and simplicity. Manage your installations effortlessly.",
                downloadBtnText: "Download Now",
                githubBtnText: "GitHub Source",
                learnMoreText: "Learn more",
                downloadsLabel: "Downloads:",
                imgCaptionText: "▶ Image from imgur (replace later)",
                footerNoteText: "Open source & blazing fast",
                learnMoreAlert: "📌 More information about VoidClient: ultra-fast updates, mod support, and complete control over your Minecraft experience."
            },
            pl: {
                badgeText: "LAUNCHER MINECRAFT",
                mainTitle: "VoidClient",
                mainDesc: "Wysokowydajny, konfigurowalny launcher Minecraft zaprojektowany z myślą o szybkości i prostocie. Zarządzaj swoimi instalacjami bez wysiłku.",
                downloadBtnText: "Pobierz teraz",
                githubBtnText: "Źródło GitHub",
                learnMoreText: "Dowiedz się więcej",
                downloadsLabel: "Pobrania:",
                imgCaptionText: "▶ Obraz z imgur (później zmienisz)",
                footerNoteText: "Open source i błyskawiczna wydajność",
                learnMoreAlert: "📌 Więcej informacji o VoidClient: błyskawiczne aktualizacje, wsparcie dla modów i pełna kontrola nad Minecraft."
            }
        };

        // ----------------------------- LICZNIK POBRAŃ (localStorage) ---------------------------------
        let currentDownloads = 0;
        const STORAGE_KEY = "voidclient_downloads_count";

        function loadDownloadCounter() {
            let stored = localStorage.getItem(STORAGE_KEY);
            if (stored !== null && !isNaN(parseInt(stored))) {
                currentDownloads = parseInt(stored);
            } else {
                // domyślna liczba pobrań (przykładowo atrakcyjna) - 1247
                currentDownloads = 1247;
                localStorage.setItem(STORAGE_KEY, currentDownloads);
            }
            updateCounterUI();
        }

        function updateCounterUI() {
            const countSpan = document.getElementById("downloadCount");
            if (countSpan) countSpan.innerText = currentDownloads.toLocaleString();
        }

        function incrementDownloadCounter() {
            currentDownloads++;
            localStorage.setItem(STORAGE_KEY, currentDownloads);
            updateCounterUI();
        }

        // ----------------------------- OBSŁUGA JĘZYKA ---------------------------------
        let currentLang = "en";   // domyślnie angielski

        // pobieranie elementów do tłumaczenia
        const elementsMap = {
            badgeText: document.getElementById("badgeText"),
            mainDesc: document.getElementById("mainDesc"),
            downloadBtnText: document.getElementById("downloadBtnText"),
            githubBtnText: document.getElementById("githubBtnText"),
            learnMoreText: document.getElementById("learnMoreText"),
            downloadsLabel: document.getElementById("downloadsLabel"),
            imgCaptionText: document.getElementById("imgCaptionText"),
            footerNoteText: document.getElementById("footerNoteText")
        };
        // dodatkowo tytuł h1 (mainTitle) jest statyczny "VoidClient" ale może być zmienny jeśli ktoś chce, w sumie nie zmienia się w tłumaczeniach, pozostawiamy ten sam, jednak dla spójności można ustawić (jest identyczny w obu językach)
        // ale dla potencjalnej zmiany tekstu głównego też użyjemy:
        const mainTitleElem = document.getElementById("mainTitle");
        
        function applyLanguage(lang) {
            const t = translations[lang];
            if (!t) return;
            if (elementsMap.badgeText) elementsMap.badgeText.innerText = t.badgeText;
            if (elementsMap.mainDesc) elementsMap.mainDesc.innerText = t.mainDesc;
            if (elementsMap.downloadBtnText) elementsMap.downloadBtnText.innerText = t.downloadBtnText;
            if (elementsMap.githubBtnText) elementsMap.githubBtnText.innerText = t.githubBtnText;
            if (elementsMap.learnMoreText) elementsMap.learnMoreText.innerText = t.learnMoreText;
            if (elementsMap.downloadsLabel) elementsMap.downloadsLabel.innerText = t.downloadsLabel;
            if (elementsMap.imgCaptionText) elementsMap.imgCaptionText.innerText = t.imgCaptionText;
            if (elementsMap.footerNoteText) elementsMap.footerNoteText.innerText = t.footerNoteText;
            if (mainTitleElem) mainTitleElem.innerText = t.mainTitle; // VoidClient, bez zmian ale spójnie
            
            // dodatkowo aktualizacja przycisku "Learn more" alert message (przechowamy dla eventu)
            window.currentLearnMoreMsg = t.learnMoreAlert;
            // zmiana aktywnych klas przycisków
            const enBtn = document.getElementById("langEnBtn");
            const plBtn = document.getElementById("langPlBtn");
            if (lang === "en") {
                enBtn.classList.add("active");
                plBtn.classList.remove("active");
            } else {
                plBtn.classList.add("active");
                enBtn.classList.remove("active");
            }
            currentLang = lang;
            localStorage.setItem("voidclient_lang_pref", lang);
        }

        function setLanguage(lang) {
            if (lang === "en" || lang === "pl") {
                applyLanguage(lang);
            }
        }

        // Inicjalizacja języka z localStorage lub domyślnie EN
        function initLanguage() {
            const savedLang = localStorage.getItem("voidclient_lang_pref");
            if (savedLang === "pl") {
                applyLanguage("pl");
            } else {
                applyLanguage("en");
            }
        }

        // ----------------------------- OBSŁUGA PRZYCISKÓW I LICZNIKA + LINKI ---------------------------------
        function setupEventListeners() {
            const downloadButton = document.getElementById("downloadBtn");
            const githubLink = document.getElementById("githubBtn");
            const learnMoreBtn = document.getElementById("learnMoreBtn");
            
            // Download: inkrementacja licznika + otwarcie youtube (tymczasowo)
            if (downloadButton) {
                downloadButton.addEventListener("click", (e) => {
                    e.preventDefault();
                    // zwiększamy licznik pobrań
                    incrementDownloadCounter();
                    // otwieramy link do youtube.com w nowej karcie (zgodnie z wymaganiem)
                    window.open("https://www.youtube.com", "_blank");
                    // opcjonalnie subtelna informacja (nic nie psuje)
                });
            }
            
            // GitHub source - link już ma href="https://github.com", ale zapewniamy target blank
            if (githubLink) {
                // ustawiamy atrybuty bezpieczeństwa (już w HTML, ale dla pewności)
                githubLink.setAttribute("target", "_blank");
                githubLink.setAttribute("rel", "noopener noreferrer");
                // opcjonalnie można dodać jeszcze, że link pozostaje github.com
                // użytkownik później podmieni docelowy adres
            }
            
            // Learn more - pokazuje wiadomość w zależności od języka
            if (learnMoreBtn) {
                learnMoreBtn.addEventListener("click", () => {
                    let msg = currentLang === "pl" ? translations.pl.learnMoreAlert : translations.en.learnMoreAlert;
                    alert(msg);
                });
            }
        }

        // Obrazek z imgur – użytkownik może podmienić, tutaj dodajemy też informację w konsoli, że można zmienić src dla hero i logo.
        // Dodatkowo, zapewniamy możliwość łatwej podmiany obrazków przez dewelopera:
        // logoImg oraz heroLargeImg są dostępne globalnie, użytkownik podmieni atrybut src na docelowy link z imgur.
        // Dla wygody w konsoli wyświetlimy pomoc.
        function setPlaceholderInfo() {
            console.log("🖼️ VOIDCLIENT | Aby podmienić obrazy: \n - Logo: document.getElementById('siteLogo').src = 'TWOJ_URL_Z_IMGUR' \n - Duży obrazek: document.getElementById('heroLargeImg').src = 'TWOJ_URL_Z_IMGUR'");
        }
        
        // walidacja i dodatkowe efekty wizualne: przycisk pobierania nie może być spamowany bez konsekwencji, ale to fine.
        // Licznik jest globalnie spójny.
        
        // Dodatkowo: Aktualizacja etykiety po zmianie języka dla licznika już jest, przyciski dynamiczne.
        // Zapewniamy, że po zmianie języka przycisk github oraz download zachowują funkcjonalność.
        // Przy zmianie języka nie resetuje licznika.
        
        // Nasłuch na przyciski języka
        function bindLangButtons() {
            const enBtn = document.getElementById("langEnBtn");
            const plBtn = document.getElementById("langPlBtn");
            if (enBtn) {
                enBtn.addEventListener("click", () => {
                    setLanguage("en");
                });
            }
            if (plBtn) {
                plBtn.addEventListener("click", () => {
                    setLanguage("pl");
                });
            }
        }
        
        // Wywołanie główne
        function init() {
            loadDownloadCounter();      // wczytanie liczby pobrań
            initLanguage();             // ustawienie języka z zapisu lub en
            bindLangButtons();          // podpięcie zmiany języka
            setupEventListeners();      // eventy dla przycisków akcji (download, learn more)
            setPlaceholderInfo();       // informacja w konsoli o możliwości podmiany obrazów
        }
        
        init();
    </script>
</body>
</html>
